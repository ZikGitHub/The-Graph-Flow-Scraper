services:
  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data

  tor-proxy:
    image: dperson/torproxy
    container_name: tor-proxy
    ports:
      - "8118:8118"
      - "9050:9050"
    restart: always

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: graphflow-backend
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
      - tor-proxy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - OLLAMA_HOST=http://host.docker.internal:11434
      - TOR_PROXY=http://tor-proxy:8118

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: graphflow-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  neo4j_data:
